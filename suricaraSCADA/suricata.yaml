%YAML 1.1
---
# ============================================================
# Hoshizora Suricata Configuration Override
# Apply with: suricata -c suricata.yaml --af-packet=<iface>
# ============================================================

vars:
  address-groups:
    HOME_NET:    "[192.168.10.0/24]"
    EXTERNAL_NET: "!$HOME_NET"
    SCADA_SERVER: "[192.168.10.10]"
    MODBUS_SLAVE: "[192.168.10.20]"
  port-groups:
    MODBUS_PORTS: "502"

# ── Rule files ────────────────────────────────────────────────────────────────
default-rule-path: /etc/suricata/rules
rule-files:
  - modbus.rules

# ── EVE JSON output ───────────────────────────────────────────────────────────
outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: /var/log/suricata/eve.json
      types:
        - alert:
            payload: yes
            payload-printable: yes
            packet: yes
            metadata: yes
        - stats:
            totals: yes
        - drop:
            alerts: yes

  - fast:
      enabled: yes
      filename: /var/log/suricata/fast.log

# ── AF-Packet (inline bridge mode for IPS, or sniff mode for IDS) ─────────────
# Set interface to the bridge/tap between MBI and IoT.
# For IDS (alert-only): mode = ids (default)
# For IPS (drop):       mode = ips  AND  copy-mode = ips
af-packet:
  - interface: br0
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes

# ── Detection settings ────────────────────────────────────────────────────────
detect:
  profile: medium
  custom-values:
    toclient-groups: 3
    toserver-groups: 25

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  default-log-level: notice
  outputs:
    - console:
        enabled: yes
    - file:
        enabled: yes
        level: info
        filename: /var/log/suricata/suricata.log
