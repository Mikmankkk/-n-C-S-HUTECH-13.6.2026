; ── Heltec ESP32-S3 V3 (WiFi Kit 32 V3) ─────────────────────────────────────
; For Heltec V2 (ESP32, not S3):
;   board     → heltec_wifi_kit_32_v2
;   lib_deps  → same (ThingPulse SSD1306 works on both)
;
; We drive the OLED directly via ThingPulse SSD1306 library instead of
; ropg/heltec_esp32_lora_v3 to avoid the RadioLib/GPIO_NUM_x redeclaration
; incompatibility that exists between that library and the Heltec board variant.

[env:hszr_iot]
platform  = espressif32
board     = heltec_wifi_kit_32_V3
framework = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; ── Libraries ─────────────────────────────────────────────────────────────────
; ThingPulse SSD1306 — battle-tested OLED driver, no LoRa conflict
lib_deps =
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays @ ^4.4.1

; ── Build flags ───────────────────────────────────────────────────────────────
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    '-DHSZR_VERSION="1.0.0"'
